<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 非常稀有 - 带有四叶图案的圆形徽章 -->
  <circle cx="50" cy="50" r="40" fill="#6be8d7" stroke="#59d6c5" stroke-width="2"/>
  <!-- 上叶片 -->
  <path d="M50,30 C55,20 60,15 65,10 C70,15 75,20 70,30 C65,35 50,30 50,30" 
        fill="#08f3ff" stroke="#00e1ed" stroke-width="1"/>
  <!-- 右叶片 -->
  <path d="M70,50 C80,45 85,40 90,35 C85,30 80,25 70,30 C65,35 70,50 70,50" 
        fill="#08f3ff" stroke="#00e1ed" stroke-width="1"/>
  <!-- 下叶片 -->
  <path d="M50,70 C55,80 50,85 45,90 C40,85 35,80 40,70 C45,65 50,70 50,70" 
        fill="#08f3ff" stroke="#00e1ed" stroke-width="1"/>
  <!-- 左叶片 -->
  <path d="M30,50 C20,45 15,40 10,35 C15,30 20,25 30,30 C35,35 30,50 30,50" 
        fill="#08f3ff" stroke="#00e1ed" stroke-width="1"/>
  <!-- 中心圆 -->
  <circle cx="50" cy="50" r="10" fill="#6be8d7" stroke="#59d6c5" stroke-width="1"/>
</svg>
