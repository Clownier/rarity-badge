<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 非常史诗 - 带有紫色闪电的六角形徽章 -->
  <defs>
    <radialGradient id="purpleAura2" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#923af0" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#923af0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#923af0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 紫色光环 -->
  <circle cx="50" cy="50" r="48" fill="url(#purpleAura2)"/>
  <!-- 六角形徽章 -->
  <path d="M50,15 L85,32.5 L85,67.5 L50,85 L15,67.5 L15,32.5 Z" 
        fill="#923af0" stroke="#7a31cc" stroke-width="2"/>
  <!-- 内部装饰 -->
  <path d="M50,25 L75,37.5 L75,62.5 L50,75 L25,62.5 L25,37.5 Z" 
        fill="none" stroke="#a85af2" stroke-width="1"/>
  <!-- 紫色闪电 -->
  <path d="M60,25 L45,50 L55,50 L40,75" 
        fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
