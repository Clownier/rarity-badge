<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 非常传说 - 带有金色光环和光芒的八角形徽章 -->
  <defs>
    <radialGradient id="goldAura2" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 金色光环 -->
  <circle cx="50" cy="50" r="48" fill="url(#goldAura2)"/>
  <!-- 光芒 -->
  <path d="M50,5 L53,20 M50,95 L47,80 M5,50 L20,53 M95,50 L80,47 M16,16 L28,28 M84,16 L72,28 M16,84 L28,72 M84,84 L72,72" 
        stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
  <!-- 八角形徽章 -->
  <path d="M50,15 L70,20 L85,35 L90,55 L85,75 L70,90 L50,95 L30,90 L15,75 L10,55 L15,35 L30,20 Z" 
        fill="#ffd700" stroke="#e6c200" stroke-width="2"/>
  <!-- 内部装饰 -->
  <path d="M50,25 L65,30 L75,40 L80,55 L75,70 L65,80 L50,85 L35,80 L25,70 L20,55 L25,40 L35,30 Z" 
        fill="none" stroke="#ffe033" stroke-width="1"/>
  <!-- 中心星形 -->
  <path d="M50,35 L55,45 L65,45 L57,52 L60,62 L50,57 L40,62 L43,52 L35,45 L45,45 Z"
        fill="#ffffff" stroke="#e6c200" stroke-width="1"/>
</svg>
