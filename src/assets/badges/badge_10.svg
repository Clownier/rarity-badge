<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 传说 - 带有金色光环的八角形徽章 -->
  <defs>
    <radialGradient id="goldAura" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#ffcc00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 金色光环 -->
  <circle cx="50" cy="50" r="48" fill="url(#goldAura)"/>
  <!-- 八角形徽章 -->
  <path d="M50,15 L70,20 L85,35 L90,55 L85,75 L70,90 L50,95 L30,90 L15,75 L10,55 L15,35 L30,20 Z" 
        fill="#ffcc00" stroke="#e6b800" stroke-width="2"/>
  <!-- 内部装饰 -->
  <path d="M50,25 L65,30 L75,40 L80,55 L75,70 L65,80 L50,85 L35,80 L25,70 L20,55 L25,40 L35,30 Z" 
        fill="none" stroke="#ffd633" stroke-width="1"/>
  <!-- 中心星形 -->
  <path d="M50,35 L55,45 L65,45 L57,52 L60,62 L50,57 L40,62 L43,52 L35,45 L45,45 Z"
        fill="#ffffff" stroke="#e6b800" stroke-width="1"/>
</svg>
