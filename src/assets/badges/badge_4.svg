<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 稀有 - 带有三叶图案的圆形徽章 -->
  <circle cx="50" cy="50" r="40" fill="#82d9b3" stroke="#6bc49e" stroke-width="2"/>
  <!-- 中央叶片 -->
  <path d="M50,30 C60,40 70,45 75,50 C70,55 60,60 50,70 C40,60 30,55 25,50 C30,45 40,40 50,30" 
        fill="#6be8d7" stroke="#59d6c5" stroke-width="1"/>
  <!-- 左侧叶片 -->
  <path d="M30,35 C40,45 45,50 45,55 C40,60 35,60 25,55 C20,50 20,45 25,40 C25,40 28,38 30,35" 
        fill="#6be8d7" stroke="#59d6c5" stroke-width="1"/>
  <!-- 右侧叶片 -->
  <path d="M70,35 C60,45 55,50 55,55 C60,60 65,60 75,55 C80,50 80,45 75,40 C75,40 72,38 70,35" 
        fill="#6be8d7" stroke="#59d6c5" stroke-width="1"/>
  <!-- 底部叶片 -->
  <path d="M50,70 C55,80 50,85 45,90 C40,85 35,80 40,70 C45,65 50,70 50,70" 
        fill="#6be8d7" stroke="#59d6c5" stroke-width="1"/>
</svg>
